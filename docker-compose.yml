services:
  postgres:
    image: postgres:16

    container_name: ithelpdesk-db

    environment:
      POSTGRES_DB: ithelpdesk
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: